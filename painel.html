<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel · Disparo SMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0c0e14;color:#e0e2ec;min-height:100vh;padding:32px 24px;}
.top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
.top h1{font-size:24px;font-weight:700;color:#fff;}
.top p{font-size:13px;color:#555;margin-top:3px;}
.btn-ref{
  background:transparent;border:1px solid #ffffff18;
  color:#888;font-size:13px;font-family:'DM Sans',sans-serif;
  padding:9px 18px;border-radius:10px;cursor:pointer;
  transition:all .15s;
}
.btn-ref:hover{background:#ffffff0a;color:#ccc;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:32px;}
.card{
  background:#13151f;
  border:1px solid #ffffff0a;
  border-radius:14px;padding:20px 18px;
}
.card .n{font-size:32px;font-weight:700;color:#fff;line-height:1;}
.card .l{font-size:12px;color:#555;margin-top:6px;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px;}
.bar h2{font-size:14px;font-weight:600;color:#999;}
.filtros{display:flex;gap:6px;flex-wrap:wrap;}
.f{
  padding:6px 14px;font-size:12px;font-weight:500;
  border-radius:20px;border:1px solid #ffffff12;
  background:transparent;color:#666;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.f.on{background:#fff;color:#111;border-color:#fff;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:520px;}
thead th{
  font-size:11px;font-weight:600;color:#444;
  letter-spacing:.8px;text-transform:uppercase;
  padding:11px 16px;text-align:left;
  border-bottom:1px solid #ffffff08;
}
tbody tr{border-bottom:1px solid #ffffff05;transition:background .1s;}
tbody tr:hover{background:#ffffff04;}
tbody td{padding:13px 16px;font-size:13px;color:#bbb;}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.vazio{text-align:center;padding:56px;color:#333;font-size:14px;}
.wa-link{color:#25D366;font-weight:600;text-decoration:none;font-size:13px;}
.wa-link:hover{opacity:.8;}
</style>
</head>
<body>
<div class="top">
  <div>
    <h1>Painel · Disparo SMS</h1>
    <p id="ultima">Carregando...</p>
  </div>
  <button class="btn-ref" onclick="carregar()">Atualizar</button>
</div>

<div class="cards" id="cards">
  <div class="card"><div class="n">—</div><div class="l">Carregando...</div></div>
</div>

<div class="bar">
  <h2>Leads capturados</h2>
  <div class="filtros">
    <button class="f on" onclick="filtrar(this,'todos')">Todos</button>
    <button class="f" onclick="filtrar(this,'joao-pessoa')">João Pessoa</button>
    <button class="f" onclick="filtrar(this,'minas-gerais')">Minas Gerais</button>
    <button class="f" onclick="filtrar(this,'palmas')">Palmas</button>
    <button class="f" onclick="filtrar(this,'rio-grande-norte')">RN</button>
  </div>
</div>

<div class="tbl-wrap">
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Convênio</th>
      <th>Data / Hora</th>
      <th>Contato</th>
    </tr>
  </thead>
  <tbody id="tbody"><tr><td colspan="6" class="vazio">Carregando dados...</td></tr></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase via fetch

const CORES = {
  'joao-pessoa':   {bg:'#1B3F7A22',txt:'#6899d4',label:'João Pessoa'},
  'minas-gerais':  {bg:'#1A5C3222',txt:'#5cb87a',label:'Minas Gerais'},
  'palmas':        {bg:'#C14B0022',txt:'#f0894a',label:'Palmas'},
  'rio-grande-norte':{bg:'#4A2FBB22',txt:'#9d82e8',label:'RN'},
};

let todos = [];
let filtroAtivo = 'todos';

async function carregar(){
  const { data, error } = await sb
    .from('disparo')
    .select('*')
    .order('criado_em', { ascending: false });

  if(error){ console.error(error); return; }
  todos = data || [];
  document.getElementById('ultima').textContent =
    'Última atualização: ' + new Date().toLocaleTimeString('pt-BR');
  renderCards();
  renderTabela();
}

function renderCards(){
  const tots = {};
  Object.keys(CORES).forEach(k => tots[k]=0);
  todos.forEach(r => { if(tots[r.convenio]!==undefined) tots[r.convenio]++; });

  document.getElementById('cards').innerHTML =
    `<div class="card"><div class="n">${todos.length}</div><div class="l">Total de leads</div></div>` +
    Object.entries(CORES).map(([k,v]) =>
      `<div class="card">
        <div class="n" style="color:${v.txt}">${tots[k]}</div>
        <div class="l"><span class="dot" style="background:${v.txt}"></span>${v.label}</div>
       </div>`
    ).join('');
}

function renderTabela(){
  const lista = filtroAtivo==='todos' ? todos : todos.filter(r=>r.convenio===filtroAtivo);
  const tbody = document.getElementById('tbody');
  if(!lista.length){
    tbody.innerHTML='<tr><td colspan="6" class="vazio">Nenhum lead encontrado</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map((r,i) => {
    const c = CORES[r.convenio]||{bg:'#fff1',txt:'#aaa',label:r.convenio};
    const tel = r.telefone ? '55'+r.telefone.replace(/\D/g,'') : '';
    const waLink = tel
      ? `<a class="wa-link" href="https://wa.me/${tel}" target="_blank">Chamar</a>`
      : '-';
    const dt = r.criado_em
      ? new Date(r.criado_em).toLocaleString('pt-BR')
      : '-';
    const fone = r.telefone
      ? r.telefone.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3')
      : '-';
    return `<tr>
      <td style="color:#333">${lista.length - i}</td>
      <td style="color:#e0e2ec;font-weight:500">${r.nome || '—'}</td>
      <td style="font-weight:600;color:#fff">${fone}</td>
      <td><span class="badge" style="background:${c.bg};color:${c.txt}">${c.label}</span></td>
      <td>${dt}</td>
      <td>${waLink}</td>
    </tr>`;
  }).join('');
}

function filtrar(btn, f){
  document.querySelectorAll('.f').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  filtroAtivo = f;
  renderTabela();
}

carregar();
setInterval(carregar, 20000);
</script>
</body>
</html>
